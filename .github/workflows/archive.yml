name: Archive IPA

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: "Build configuration"
        required: true
        default: "Release"
        type: choice
        options:
          - Release
          - Debug

concurrency:
  group: archive-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  archive:
    name: Archive & Export IPA
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          if [[ -d /Applications/Xcode_16.4.app ]]; then
            sudo xcode-select -s /Applications/Xcode_16.4.app
          elif [[ -d /Applications/Xcode_16.3.app ]]; then
            sudo xcode-select -s /Applications/Xcode_16.3.app
          elif [[ -d /Applications/Xcode_16.2.app ]]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app
          elif [[ -d /Applications/Xcode_16.1.app ]]; then
            sudo xcode-select -s /Applications/Xcode_16.1.app
          elif [[ -d /Applications/Xcode_16.0.app ]]; then
            sudo xcode-select -s /Applications/Xcode_16.0.app
          elif [[ -d /Applications/Xcode_15.4.app ]]; then
            sudo xcode-select -s /Applications/Xcode_15.4.app
          else
            sudo xcode-select -s /Applications/Xcode.app
          fi
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen || brew upgrade xcodegen || true

      - name: Generate Xcode project
        run: |
          set -euo pipefail
          xcodegen generate
          test -d Quicksilver.xcodeproj

      - name: Check signing secrets
        id: signing
        run: |
          if [[ -n "${{ secrets.BUILD_CERTIFICATE_BASE64 }}" && -n "${{ secrets.P12_PASSWORD }}" && -n "${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "Signing secrets detected."
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Signing secrets not configured. Archive will build for generic iOS device without export. Add BUILD_CERTIFICATE_BASE64, P12_PASSWORD, BUILD_PROVISION_PROFILE_BASE64 (and optionally KEYCHAIN_PASSWORD, TEAM_ID) to enable IPA export."
          fi

      - name: Install signing certificate & profile
        if: steps.signing.outputs.available == 'true'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"
          security create-keychain -p "${KEYCHAIN_PASSWORD:-temporary}" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD:-temporary}" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Archive
        run: |
          set -euo pipefail
          mkdir -p build
          if [[ "${{ steps.signing.outputs.available }}" == "true" ]]; then
            xcodebuild \
              -project Quicksilver.xcodeproj \
              -scheme Quicksilver \
              -configuration ${{ inputs.configuration }} \
              -destination "generic/platform=iOS" \
              -archivePath build/Quicksilver.xcarchive \
              -derivedDataPath DerivedData \
              archive \
              2>&1 | tee archive.log
          else
            # Unsigned archive attempt for diagnostics only — expected to fail at codesign
            # Prefer validating the project still compiles for device architecture
            xcodebuild \
              -project Quicksilver.xcodeproj \
              -scheme Quicksilver \
              -configuration ${{ inputs.configuration }} \
              -destination "generic/platform=iOS" \
              -derivedDataPath DerivedData \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              build \
              2>&1 | tee archive.log
            echo "::notice::Unsigned device build completed. Configure signing secrets to produce an IPA."
          fi

      - name: Export IPA
        if: steps.signing.outputs.available == 'true'
        run: |
          set -euo pipefail
          cat > build/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>teamID</key>
            <string>${{ secrets.TEAM_ID }}</string>
            <key>compileBitcode</key>
            <false/>
            <key>signingStyle</key>
            <string>manual</string>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath build/Quicksilver.xcarchive \
            -exportOptionsPlist build/ExportOptions.plist \
            -exportPath build/ipa \
            2>&1 | tee export.log
          ls -la build/ipa || true

      - name: Upload IPA artifact
        if: steps.signing.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Quicksilver-IPA
          path: build/ipa/*.ipa
          retention-days: 14
          if-no-files-found: warn

      - name: Upload archive logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: archive-logs
          path: |
            archive.log
            export.log
            build/
          retention-days: 7
          if-no-files-found: ignore
