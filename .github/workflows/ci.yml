name: Quicksilver CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  structure:
    name: Structure & Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify modular layout
        run: |
          set -euo pipefail
          echo "== Required directories =="
          for d in App Core Personas Nexus UI Memory Services Tests Documentation Intents Resources; do
            if [[ ! -d "$d" ]]; then
              echo "::error::Missing required directory: $d/"
              exit 1
            fi
            echo "  OK  $d/"
          done

          echo "== Core contracts =="
          for f in \
            Core/Protocols/AIProvider.swift \
            Core/Protocols/MemoryStore.swift \
            Core/Protocols/DiagnosticProvider.swift \
            Core/Protocols/PersonaEngine.swift \
            Core/Protocols/AutomationProvider.swift \
            Core/Models/AIRequest.swift \
            Core/Models/AIResponse.swift \
            Core/Models/MemoryItem.swift \
            Package.swift \
            project.yml \
            App/QuicksilverApp.swift \
            App/DependencyContainer.swift \
            Nexus/NexusCoordinator.swift \
            UI/ContentView.swift \
            Documentation/ARCHITECTURE.md
          do
            if [[ ! -f "$f" ]]; then
              echo "::error::Missing required file: $f"
              exit 1
            fi
            echo "  OK  $f"
          done
          echo "Structure and contracts verified."

  spm-test:
    name: SPM Unit Tests
    runs-on: macos-15
    needs: structure
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          echo "Available Xcode apps:"
          ls /Applications | grep -i xcode || true
          if [[ -d /Applications/Xcode_16.4.app ]]; then
            sudo xcode-select -s /Applications/Xcode_16.4.app
          elif [[ -d /Applications/Xcode_16.3.app ]]; then
            sudo xcode-select -s /Applications/Xcode_16.3.app
          elif [[ -d /Applications/Xcode_16.2.app ]]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app
          elif [[ -d /Applications/Xcode_16.1.app ]]; then
            sudo xcode-select -s /Applications/Xcode_16.1.app
          elif [[ -d /Applications/Xcode_16.0.app ]]; then
            sudo xcode-select -s /Applications/Xcode_16.0.app
          elif [[ -d /Applications/Xcode_15.4.app ]]; then
            sudo xcode-select -s /Applications/Xcode_15.4.app
          else
            sudo xcode-select -s /Applications/Xcode.app
          fi
          echo "Active developer dir: $(xcode-select -p)"
          xcodebuild -version
          swift --version

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('Package.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Resolve packages
        run: swift package resolve

      - name: Run tests
        run: |
          set -euo pipefail
          swift test --enable-code-coverage 2>&1 | tee spm-test.log

      - name: Summarize test results
        if: always()
        run: |
          echo "=== SPM Test Summary ==="
          grep -E "Test Suite|passed|failed|error:|Executed" spm-test.log || true

      - name: Upload SPM logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spm-test-logs
          path: spm-test.log
          retention-days: 7
          if-no-files-found: ignore

  ios-simulator:
    name: iOS Simulator Build
    runs-on: macos-15
    needs: structure
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          if [[ -d /Applications/Xcode_16.4.app ]]; then
            sudo xcode-select -s /Applications/Xcode_16.4.app
          elif [[ -d /Applications/Xcode_16.3.app ]]; then
            sudo xcode-select -s /Applications/Xcode_16.3.app
          elif [[ -d /Applications/Xcode_16.2.app ]]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app
          elif [[ -d /Applications/Xcode_16.1.app ]]; then
            sudo xcode-select -s /Applications/Xcode_16.1.app
          elif [[ -d /Applications/Xcode_16.0.app ]]; then
            sudo xcode-select -s /Applications/Xcode_16.0.app
          elif [[ -d /Applications/Xcode_15.4.app ]]; then
            sudo xcode-select -s /Applications/Xcode_15.4.app
          else
            sudo xcode-select -s /Applications/Xcode.app
          fi
          xcodebuild -version
          swift --version

      - name: Install XcodeGen + SwiftLint
        run: |
          set -euo pipefail
          brew install xcodegen swiftlint || brew upgrade xcodegen swiftlint || true
          xcodegen --version
          swiftlint version || true

      - name: Generate Xcode project
        run: |
          set -euo pipefail
          echo "Generating Quicksilver.xcodeproj from project.yml…"
          xcodegen generate
          if [[ ! -d Quicksilver.xcodeproj ]]; then
            echo "::error::XcodeGen did not produce Quicksilver.xcodeproj"
            exit 1
          fi
          echo "Project generated."
          xcodebuild -list -project Quicksilver.xcodeproj

      - name: SwiftLint (advisory)
        run: |
          if command -v swiftlint >/dev/null 2>&1; then
            echo "=== SwiftLint (advisory) ==="
            swiftlint --reporter emoji || true
          else
            echo "SwiftLint not available — skipping"
          fi

      - name: Resolve destination (iPhone simulator)
        id: dest
        run: |
          set -euo pipefail
          DEST=""
          for pattern in "iPhone 16" "iPhone 15" "iPhone 14" "iPhone"; do
            line=$(xcrun simctl list devices available 2>/dev/null | grep -i "$pattern" | head -1 || true)
            if [[ -n "$line" ]]; then
              DEST=$(echo "$line" | grep -oE '\([A-F0-9-]{36}\)' | tr -d '()' || true)
              if [[ -n "$DEST" ]]; then
                echo "Matched: $line"
                break
              fi
            fi
          done
          if [[ -z "$DEST" ]]; then
            echo "::error::No iPhone simulator found"
            xcrun simctl list devices available || true
            exit 1
          fi
          echo "Using simulator UDID: $DEST"
          echo "udid=$DEST" >> "$GITHUB_OUTPUT"

      - name: Build for iOS Simulator
        run: |
          set -euo pipefail
          echo "Building scheme Quicksilver for iOS Simulator…"
          xcodebuild \
            -project Quicksilver.xcodeproj \
            -scheme Quicksilver \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=${{ steps.dest.outputs.udid }}" \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY= \
            CODE_SIGNING_REQUIRED=NO \
            build | tee xcodebuild.log

      - name: Build diagnostics on failure
        if: failure()
        run: |
          echo "::group::Last 150 lines of xcodebuild.log"
          tail -n 150 xcodebuild.log || true
          echo "::endgroup::"
          echo "::group::Errors only"
          grep -iE "error:|fatal|failed" xcodebuild.log | tail -n 40 || true
          echo "::endgroup::"

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-build-logs
          path: |
            xcodebuild.log
            DerivedData/Logs
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload generated project on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: generated-xcodeproj
          path: Quicksilver.xcodeproj
          retention-days: 3
          if-no-files-found: ignore
