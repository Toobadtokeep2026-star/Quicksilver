name: Quicksilver CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify modular structure
        run: |
          echo "Checking required Day One directories..."
          test -d App || (echo "Missing App/" && exit 1)
          test -d Core || (echo "Missing Core/" && exit 1)
          test -d Personas || (echo "Missing Personas/" && exit 1)
          test -d Nexus || (echo "Missing Nexus/" && exit 1)
          test -d UI || (echo "Missing UI/" && exit 1)
          test -d Tests || (echo "Missing Tests/" && exit 1)
          test -f Package.swift || (echo "Missing Package.swift" && exit 1)
          echo "Structure OK"

      - name: Check for required source files
        run: |
          test -f App/QuicksilverApp.swift
          test -f App/DependencyContainer.swift
          test -f Core/AppConfiguration.swift
          test -f Core/AppError.swift
          test -f Personas/PersonaConfiguration.swift
          test -f Personas/PersonaManager.swift
          test -f Nexus/NexusCoordinator.swift
          test -f UI/ContentView.swift
          echo "Core files present"

  core-tests:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Swift version
        run: swift --version

      - name: Install SwiftLint
        run: brew install swiftlint || true

      - name: Run SwiftLint (advisory)
        run: |
          if command -v swiftlint >/dev/null 2>&1; then
            echo "=== SwiftLint report (non-blocking until debt is cleaned) ==="
            swiftlint --reporter emoji || true
            echo "=== End SwiftLint report ==="
          else
            echo "SwiftLint not available — skipping"
          fi

      - name: Build and test QuicksilverCore
        run: |
          swift package resolve
          swift test --enable-code-coverage 2>&1 | tee test-output.txt
        continue-on-error: false

      - name: Summarize
        if: always()
        run: |
          echo "=== Test summary ==="
          grep -E "Test Suite|passed|failed|error:" test-output.txt || true
