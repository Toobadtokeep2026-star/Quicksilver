name: Quicksilver CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify modular structure
        run: |
          set -e
          echo "Checking required directories..."
          for d in App Core Personas Nexus UI Memory Services Tests Documentation; do
            test -d "$d" || (echo "Missing $d/" && exit 1)
          done
          test -d Core/Protocols || (echo "Missing Core/Protocols/" && exit 1)
          test -d Core/Models || (echo "Missing Core/Models/" && exit 1)
          test -f Package.swift || (echo "Missing Package.swift" && exit 1)
          echo "Structure OK"

      - name: Verify Core contracts
        run: |
          set -e
          test -f Core/Protocols/AIProvider.swift
          test -f Core/Protocols/MemoryStore.swift
          test -f Core/Protocols/DiagnosticProvider.swift
          test -f Core/Protocols/PersonaEngine.swift
          test -f Core/Protocols/AutomationProvider.swift
          test -f Core/Models/AIRequest.swift
          test -f Core/Models/AIResponse.swift
          test -f Core/Models/MemoryItem.swift
          echo "Core contracts present"

      - name: Verify Memory foundation
        run: |
          set -e
          test -f Memory/MemoryStore.swift
          test -f Memory/SwiftDataMemoryStore.swift
          test -f Memory/InMemoryMemoryStore.swift
          test -f Memory/MemoryQuery.swift
          test -f Memory/MemoryManager.swift
          echo "Memory foundation present"

      - name: Verify required source files
        run: |
          set -e
          test -f App/QuicksilverApp.swift
          test -f App/DependencyContainer.swift
          test -f Personas/PersonaManager.swift
          test -f Personas/MemoryPolicy.swift
          test -f Nexus/NexusCoordinator.swift
          test -f Nexus/PIPELINE.md
          test -f UI/ContentView.swift
          test -f Documentation/ARCHITECTURE.md
          echo "Core files present"

  core-tests:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Swift version
        run: swift --version

      - name: Install SwiftLint
        run: brew install swiftlint || true

      - name: Run SwiftLint (advisory)
        run: |
          if command -v swiftlint >/dev/null 2>&1; then
            echo "=== SwiftLint report (advisory) ==="
            swiftlint --reporter emoji || true
            echo "=== End SwiftLint report ==="
          else
            echo "SwiftLint not available — skipping"
          fi

      - name: Build and test QuicksilverCore
        run: |
          swift package resolve
          swift test --enable-code-coverage 2>&1 | tee test-output.txt
        continue-on-error: false

      - name: Summarize
        if: always()
        run: |
          echo "=== Test summary ==="
          grep -E "Test Suite|passed|failed|error:" test-output.txt || true
