# SwiftLint configuration for Quicksilver
# Keep rules strict but practical for a modular SwiftUI codebase.

disabled_rules:
  - trailing_whitespace
  - todo

opt_in_rules:
  - empty_count
  - closure_end_indentation
  - explicit_init
  - first_where
  - joined_default_parameter
  - literal_expression_end_indentation
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - private_outlet
  - prohibited_super_call
  - redundant_nil_coalescing
  - sorted_first_last
  - vertical_parameter_alignment_on_call
  - yoda_condition

excluded:
  - Pods
  - .build
  - DerivedData
  - Tests # tests can be slightly more verbose

line_length:
  warning: 140
  error: 200

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - url
    - x
    - y

type_name:
  min_length:
    warning: 3

force_cast: error
force_try: error
force_unwrapping: warning

vertical_whitespace:
  max_empty_lines: 2

file_length:
  warning: 400
  error: 600
