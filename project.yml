name: Quicksilver
options:
  bundleIdPrefix: com.quicksilver
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  Quicksilver:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: UI
      - path: Core
      - path: Personas
      - path: Memory
      - path: Nexus
      - path: Services/AI
      - path: Intents
      - path: Models
        optional: true
    resources:
      - path: Resources
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.quicksilver.app
        INFOPLIST_KEY_CFBundleDisplayName: Quicksilver
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        SWIFT_STRICT_CONCURRENCY: targeted
    dependencies: []

  QuicksilverTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Quicksilver
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Quicksilver:
    build:
      targets:
        Quicksilver: all
        QuicksilverTests: [test]
    test:
      targets:
        - QuicksilverTests
    run:
      config: Debug
